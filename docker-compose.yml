version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: eduforkids_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: learning_platform
      MYSQL_USER: eduuser
      MYSQL_PASSWORD: edupass123
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - edufor_network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot123']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: edufor_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - edufor_network
    command: redis-server --appendonly yes --requirepass redis123
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis123', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer - MySQL GUI
  adminer:
    image: adminer:latest
    container_name: edufor_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    networks:
      - edufor_network
    depends_on:
      - mysql
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha

  # Redis Commander - Redis GUI
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: edufor_redis_commander
    restart: unless-stopped
    ports:
      - '8081:8081'
    networks:
      - edufor_network
    depends_on:
      - redis
    environment:
      - REDIS_HOSTS=local:redis:6379:0:redis123

networks:
  edufor_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
